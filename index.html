<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>每日决策</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="每日决策">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffbf47">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      background: #f6f8fb;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 85% 5%, rgba(255, 203, 92, 0.46), transparent 32%),
        radial-gradient(circle at 8% 86%, rgba(112, 190, 255, 0.24), transparent 34%),
        linear-gradient(180deg, #fff4c8 0%, #fffdf4 28%, #f6f8fb 100%);
      color: #1f2937;
      padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
    }

    .app {
      max-width: 780px;
      margin: 0 auto;
      padding-bottom: 36px;
    }

    .hero {
      margin: 14px 0 16px;
      padding: 24px 20px 20px;
      border-radius: 30px;
      background: linear-gradient(135deg, #ffe08a 0%, #ffbb55 58%, #ffd56d 100%);
      box-shadow: 0 18px 38px rgba(255, 180, 70, 0.32);
      color: #4a3100;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "☀️";
      position: absolute;
      right: 20px;
      top: 18px;
      font-size: 44px;
      opacity: 0.9;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -54px;
      bottom: -58px;
      width: 170px;
      height: 170px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.24);
    }

    .hero h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.8px;
      position: relative;
      z-index: 1;
    }

    .hero p {
      margin: 9px 0 0;
      max-width: 82%;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 600;
      color: rgba(74, 49, 0, 0.75);
      position: relative;
      z-index: 1;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 15px;
      position: relative;
      z-index: 1;
    }

    .badge {
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.45);
      font-size: 12px;
      font-weight: 700;
      color: rgba(74, 49, 0, 0.78);
    }

    .card {
      margin: 14px 0;
      padding: 17px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 14px 34px rgba(31, 41, 55, 0.08),
        inset 0 0 0 1px rgba(255, 255, 255, 0.78);
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .card-title h2 {
      margin: 0;
      font-size: 19px;
      font-weight: 850;
      letter-spacing: -0.3px;
      color: #111827;
    }

    .card-title span {
      font-size: 12px;
      color: #8b93a1;
      font-weight: 650;
    }

    .section-title {
      margin: 15px 0 9px;
      font-size: 14px;
      font-weight: 800;
      color: #4b5563;
    }

    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-bottom: 4px;
    }

    .chip {
      width: auto;
      margin: 0;
      padding: 10px 14px;
      border: none;
      border-radius: 999px;
      background: #f4f7fb;
      color: #4b5563;
      font-size: 14px;
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.16);
      cursor: pointer;
      transition: 0.18s ease;
    }

    .chip.active {
      color: #4a3100;
      background: linear-gradient(135deg, #ffd66d, #ffad3d);
      box-shadow: 0 9px 18px rgba(255, 174, 61, 0.30);
      transform: translateY(-1px);
    }

    textarea {
      width: 100%;
      min-height: 84px;
      margin: 7px 0 4px;
      padding: 13px 14px;
      border: none;
      outline: none;
      border-radius: 18px;
      resize: vertical;
      background: #f7f9fc;
      color: #1f2937;
      font-size: 15px;
      line-height: 1.6;
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.18);
    }

    textarea::placeholder {
      color: #a0a8b5;
    }

    textarea:focus {
      background: #ffffff;
      box-shadow:
        inset 0 0 0 1.5px rgba(255, 172, 51, 0.76),
        0 0 0 4px rgba(255, 198, 91, 0.18);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 17px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 14px 12px;
      font-size: 15px;
      font-weight: 850;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn-primary {
      color: #4a3100;
      background: linear-gradient(135deg, #ffd56a, #ffad3d);
      box-shadow: 0 11px 24px rgba(255, 174, 61, 0.28);
    }

    .btn-secondary {
      color: #34506f;
      background: rgba(255, 255, 255, 0.86);
      box-shadow:
        0 8px 18px rgba(31, 41, 55, 0.06),
        inset 0 0 0 1px rgba(148, 163, 184, 0.18);
    }

    .hint {
      margin-top: 11px;
      color: #7b8494;
      font-size: 12px;
      line-height: 1.6;
    }

    .output {
      min-height: 136px;
      margin: 0;
      padding: 15px;
      border-radius: 20px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.75;
      font-size: 14px;
      color: #374151;
      background: #fffaf0;
      box-shadow: inset 0 0 0 1px rgba(255, 203, 125, 0.34);
    }

    canvas {
      width: 100% !important;
      max-height: 280px;
      margin-top: 6px;
      padding: 10px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.14);
    }

    .footer {
      margin: 20px 0 8px;
      text-align: center;
      color: #8a93a3;
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 520px) {
      body {
        padding-left: 10px;
        padding-right: 10px;
      }

      .hero {
        border-radius: 28px;
        padding: 23px 18px 19px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .hero p {
        max-width: 80%;
        font-size: 13px;
      }

      .card {
        border-radius: 24px;
        padding: 16px;
      }

      .button-grid {
        grid-template-columns: 1fr;
      }

      .chip {
        padding: 10px 13px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="hero">
      <h1>每日决策</h1>
      <p>每天 1 分钟，记录学习、投资和状态，让选择更清晰。</p>
      <div class="badges">
        <div class="badge">轻记录</div>
        <div class="badge">智能复盘</div>
        <div class="badge">趋势追踪</div>
      </div>
    </section>

    <section class="card">
      <div class="card-title">
        <h2>📌 今日记录</h2>
        <span>点击选择即可</span>
      </div>

      <div class="section-title">📚 学习状态</div>
      <div class="chip-group">
        <button class="chip" onclick="setChoice('studyStatus','高效完成', this)">高效完成</button>
        <button class="chip" onclick="setChoice('studyStatus','完成部分', this)">完成部分</button>
        <button class="chip" onclick="setChoice('studyStatus','只看没练', this)">只看没练</button>
        <button class="chip" onclick="setChoice('studyStatus','未开始', this)">未开始</button>
      </div>

      <div class="section-title">💰 投资操作</div>
      <div class="chip-group">
        <button class="chip" onclick="setChoice('investAction','买入', this)">买入</button>
        <button class="chip" onclick="setChoice('investAction','卖出', this)">卖出</button>
        <button class="chip" onclick="setChoice('investAction','加仓', this)">加仓</button>
        <button class="chip" onclick="setChoice('investAction','减仓', this)">减仓</button>
        <button class="chip" onclick="setChoice('investAction','观望', this)">观望</button>
        <button class="chip" onclick="setChoice('investAction','无操作', this)">无操作</button>
      </div>

      <div class="section-title">😴 睡眠状态</div>
      <div class="chip-group">
        <button class="chip" onclick="setChoice('sleep','好', this)">好</button>
        <button class="chip" onclick="setChoice('sleep','一般', this)">一般</button>
        <button class="chip" onclick="setChoice('sleep','差', this)">差</button>
      </div>

      <div class="section-title">⚡ 精力水平</div>
      <div class="chip-group">
        <button class="chip" onclick="setChoice('energy','1', this)">1</button>
        <button class="chip" onclick="setChoice('energy','2', this)">2</button>
        <button class="chip" onclick="setChoice('energy','3', this)">3</button>
        <button class="chip" onclick="setChoice('energy','4', this)">4</button>
        <button class="chip" onclick="setChoice('energy','5', this)">5</button>
        <button class="chip" onclick="setChoice('energy','6', this)">6</button>
        <button class="chip" onclick="setChoice('energy','7', this)">7</button>
        <button class="chip" onclick="setChoice('energy','8', this)">8</button>
        <button class="chip" onclick="setChoice('energy','9', this)">9</button>
        <button class="chip" onclick="setChoice('energy','10', this)">10</button>
      </div>

      <div class="section-title">😊 今日心情</div>
      <div class="chip-group">
        <button class="chip" onclick="setChoice('mood','平静', this)">平静</button>
        <button class="chip" onclick="setChoice('mood','积极', this)">积极</button>
        <button class="chip" onclick="setChoice('mood','焦虑', this)">焦虑</button>
        <button class="chip" onclick="setChoice('mood','疲惫', this)">疲惫</button>
        <button class="chip" onclick="setChoice('mood','烦躁', this)">烦躁</button>
      </div>

      <div class="section-title">📝 学习补充，可不填</div>
      <textarea id="studyNote" placeholder="例如：刷了10道言语，背了30个雅思单词"></textarea>

      <div class="section-title">📝 投资补充，可不填</div>
      <textarea id="investNote" placeholder="例如：今天主要观望科技，没追高"></textarea>

      <div class="section-title">📝 其他备注，可不填</div>
      <textarea id="otherNote" placeholder="例如：午睡后很昏沉，晚上状态一般"></textarea>

      <div class="button-grid">
        <button class="btn btn-primary" onclick="saveRecord()">保存今天</button>
        <button class="btn btn-secondary" onclick="showRecent()">最近7天</button>
        <button class="btn btn-primary" onclick="smartReview()">智能复盘</button>
        <button class="btn btn-secondary" onclick="clearToday()">清空当前</button>
      </div>

      <div class="hint">
        数据保存在当前浏览器本地。换设备或清理浏览器数据后，本地记录可能会丢失。
      </div>
    </section>

    <section class="card">
      <div class="card-title">
        <h2>🤖 智能输出</h2>
        <span>复盘 / 历史</span>
      </div>
      <pre class="output" id="output">这里会显示最近记录或智能复盘结果。</pre>
    </section>

    <section class="card">
      <div class="card-title">
        <h2>📈 精力趋势</h2>
        <span>近14条记录</span>
      </div>
      <canvas id="energyChart"></canvas>
    </section>

    <section class="card">
      <div class="card-title">
        <h2>📊 行为趋势</h2>
        <span>1=有投资动作</span>
      </div>
      <canvas id="actionChart"></canvas>
    </section>

    <div class="footer">
      每日决策 v5.2<br>
      先记录，再理解，再优化自己
    </div>
  </main>

  <script>
    const STORAGE_KEY = "daily_decision_v52";

    let todayChoice = {
      studyStatus: "",
      investAction: "",
      sleep: "",
      energy: "",
      mood: ""
    };

    let energyChartInstance = null;
    let actionChartInstance = null;

    function setChoice(key, value, el) {
      todayChoice[key] = value;

      const group = el.parentElement;
      const chips = group.querySelectorAll(".chip");
      chips.forEach(chip => chip.classList.remove("active"));
      el.classList.add("active");
    }

    function getData() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function saveRecord() {
      if (
        !todayChoice.studyStatus &&
        !todayChoice.investAction &&
        !todayChoice.sleep &&
        !todayChoice.energy &&
        !todayChoice.mood &&
        !studyNote.value.trim() &&
        !investNote.value.trim() &&
        !otherNote.value.trim()
      ) {
        alert("今天还没有选择或填写内容哦。");
        return;
      }

      const data = getData();

      const record = {
        date: new Date().toLocaleDateString(),
        dateTime: new Date().toLocaleString(),
        studyStatus: todayChoice.studyStatus,
        investAction: todayChoice.investAction,
        sleep: todayChoice.sleep,
        energy: Number(todayChoice.energy) || 0,
        mood: todayChoice.mood,
        studyNote: studyNote.value.trim(),
        investNote: investNote.value.trim(),
        otherNote: otherNote.value.trim()
      };

      data.push(record);
      saveData(data);

      alert("已保存今天记录");
      renderCharts();
    }

    function showRecent() {
      const data = getData();
      const recent = data.slice(-7).reverse();

      if (!recent.length) {
        output.innerText = "暂无记录。";
        return;
      }

      output.innerText = recent.map(item => {
        return `📅 ${item.dateTime}
📚 学习：${item.studyStatus || "未填"}${item.studyNote ? "｜" + item.studyNote : ""}
💰 投资：${item.investAction || "未填"}${item.investNote ? "｜" + item.investNote : ""}
😴 睡眠：${item.sleep || "未填"} ｜ ⚡精力：${item.energy || "未填"} ｜ 😊心情：${item.mood || "未填"}
📝 备注：${item.otherNote || "无"}`;
      }).join("\n\n-----------------------------\n\n");
    }

    function smartReview() {
      const data = getData();

      if (!data.length) {
        output.innerText = "暂无数据，先保存今天记录再复盘。";
        return;
      }

      const last = data[data.length - 1];
      const recent7 = data.slice(-7);

      const avgEnergy = recent7.reduce((sum, x) => sum + (x.energy || 0), 0) / recent7.length;

      let review = `☀️ 每日决策 · 智能复盘

📅 今日记录：${last.dateTime}

一、今日概况
- 学习状态：${last.studyStatus || "未填"}
- 投资操作：${last.investAction || "未填"}
- 睡眠状态：${last.sleep || "未填"}
- 精力水平：${last.energy || "未填"}
- 今日心情：${last.mood || "未填"}

二、系统判断
`;

      if (last.energy >= 8) {
        review += "- 你今天整体精力较高，适合处理重点任务，也适合推进学习和复盘。\n";
      } else if (last.energy >= 5) {
        review += "- 你今天精力中等，适合稳步推进，不适合塞太多任务。\n";
      } else {
        review += "- 你今天精力偏低，优先保状态，重要决策要谨慎。\n";
      }

      if (last.sleep === "差") {
        review += "- 睡眠偏差可能会直接影响判断力，今天更容易情绪化或效率打折。\n";
      }

      if (["买入", "卖出", "加仓", "减仓"].includes(last.investAction) && last.energy <= 4) {
        review += "- 今天在低精力状态下做了投资动作，建议重点检查是否受情绪影响。\n";
      } else if (last.investAction === "观望" || last.investAction === "无操作") {
        review += "- 今天投资上比较克制，这通常有助于减少冲动决策。\n";
      }

      if (last.studyStatus === "高效完成") {
        review += "- 今天学习执行不错，说明你的行动力在线。\n";
      } else if (last.studyStatus === "完成部分") {
        review += "- 今天学习有推进，保持连续性比一次学很多更重要。\n";
      } else if (last.studyStatus === "只看没练") {
        review += "- 今天偏输入，建议明天补一点输出，比如刷题、复盘或总结。\n";
      } else if (last.studyStatus === "未开始") {
        review += "- 今天学习未启动，建议明天把门槛压低，只求先开始。\n";
      }

      review += `\n三、近7天趋势
- 最近7天平均精力：${avgEnergy.toFixed(1)}
- 记录天数：${recent7.length}
`;

      const actionDays = recent7.filter(x => ["买入", "卖出", "加仓", "减仓"].includes(x.investAction)).length;

      if (actionDays >= 4) {
        review += "- 近期投资动作偏多，建议检查是否存在被消息牵着走、频繁应对市场波动的倾向。\n";
      } else {
        review += "- 近期投资节奏整体还算稳定，没有明显过度频繁操作。\n";
      }

      const studyGoodDays = recent7.filter(x => x.studyStatus === "高效完成" || x.studyStatus === "完成部分").length;

      if (studyGoodDays >= 4) {
        review += "- 近期学习连续性不错，保持节奏比追求强度更重要。\n";
      } else {
        review += "- 近期学习连续性一般，可以把目标设得再小一点，先把节奏稳住。\n";
      }

      review += `\n四、明日建议
`;

      if (last.energy <= 4 || last.sleep === "差") {
        review += "- 明天优先做减法：少看消息，少做高压力决策，先把状态拉回来。\n";
      } else {
        review += "- 明天优先做一件最重要的事，不贪多，先拿下一个确定性成果。\n";
      }

      if (!last.studyStatus || last.studyStatus === "未开始") {
        review += "- 学习上先完成一个最小动作，例如 10 分钟复习 / 5 道题 / 20 个单词。\n";
      }

      if (!last.investAction || last.investAction === "观望" || last.investAction === "无操作") {
        review += "- 投资上继续保持“先判断主线、再考虑位置、最后看是否动作”的节奏。\n";
      } else {
        review += "- 投资上建议把今天动作背后的原因写短一点，防止以后自己都忘了为什么买卖。\n";
      }

      output.innerText = review;
    }

    function clearToday() {
      todayChoice = {
        studyStatus: "",
        investAction: "",
        sleep: "",
        energy: "",
        mood: ""
      };

      document.querySelectorAll(".chip").forEach(chip => chip.classList.remove("active"));

      studyNote.value = "";
      investNote.value = "";
      otherNote.value = "";

      output.innerText = "当前输入已清空。";
    }

    function renderCharts() {
      const data = getData();
      const recent = data.slice(-14);

      const labels = recent.map(item => item.date);
      const energyData = recent.map(item => item.energy || 0);

      const actionMap = {
        "无操作": 0,
        "观望": 0,
        "买入": 1,
        "卖出": 1,
        "加仓": 1,
        "减仓": 1
      };

      const actionData = recent.map(item => actionMap[item.investAction] ?? 0);

      if (energyChartInstance) {
        energyChartInstance.destroy();
      }

      if (actionChartInstance) {
        actionChartInstance.destroy();
      }

      energyChartInstance = new Chart(document.getElementById("energyChart"), {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "精力水平",
            data: energyData,
            tension: 0.35,
            fill: true
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: true
            }
          },
          scales: {
            y: {
              min: 0,
              max: 10,
              ticks: {
                stepSize: 1
              }
            }
          }
        }
      });

      actionChartInstance = new Chart(document.getElementById("actionChart"), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "是否有投资动作",
            data: actionData
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: true
            }
          },
          scales: {
            y: {
              min: 0,
              max: 1,
              ticks: {
                stepSize: 1
              }
            }
          }
        }
      });
    }

    renderCharts();
  </script>
</body>
</html>
