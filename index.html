<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生决策系统 v5.1</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:-apple-system;background:#f5f5f5;padding:16px;}
h1{font-size:22px;}
.card{background:white;padding:12px;margin:10px 0;border-radius:12px;}
textarea,input{width:100%;padding:8px;margin:6px 0;}
button{width:100%;padding:10px;margin-top:8px;background:#007AFF;color:white;border:none;border-radius:10px;}
pre{white-space:pre-wrap;}
</style>
</head>

<body>

<h1>📊 人生决策系统 v5.1</h1>

<div class="card">
<h3>📚 今日学习</h3>
<textarea id="study"></textarea>
</div>

<div class="card">
<h3>💰 投资记录</h3>
<textarea id="invest"></textarea>
</div>

<div class="card">
<h3>⚡ 状态</h3>
<input id="energy" placeholder="精力 1-10">
<input id="sleep" placeholder="睡眠（好/一般/差）">
</div>

<button onclick="save()">保存今日</button>
<button onclick="show()">查看最近7天</button>
<button onclick="report()">生成复盘</button>

<div class="card">
<h3>📈 输出</h3>
<pre id="out"></pre>
</div>

<canvas id="c1"></canvas>
<canvas id="c2"></canvas>

<script>
function get(){
  return JSON.parse(localStorage.getItem("v51")||"[]");
}

function save(){
  let d=get();
  d.push({
    t:new Date().toLocaleDateString(),
    study:study.value,
    invest:invest.value,
    energy:+energy.value||0,
    sleep:sleep.value
  });
  localStorage.setItem("v51",JSON.stringify(d));
  alert("已保存");
  draw();
}

function show(){
  let d=get().slice(-7).reverse();
  out.innerText=d.map(x=>
`📅 ${x.t}
📚 ${x.study}
💰 ${x.invest}
⚡ ${x.energy} 睡眠:${x.sleep}`
).join("\n------\n");
}

function report(){
  let d=get();
  if(!d.length){out.innerText="暂无数据";return;}

  let avg=d.reduce((a,b)=>a+(b.energy||0),0)/d.length;

  out.innerText=
`📊 系统复盘

📈 平均精力：${avg.toFixed(1)}
📚 记录天数：${d.length}

🧠 判断：
${avg<5?"状态偏低，避免冲动决策":"状态正常，可推进任务"}

💡 建议：
减少信息输入，增加专注执行时间。`;
}

function draw(){
  let d=get();
  let labels=d.map(x=>x.t);
  let energy=d.map(x=>x.energy);

  new Chart(c1,{
    type:'line',
    data:{labels,datasets:[{label:'精力',data:energy}]}
  });
}

draw();
</script>

</body>
</html>
